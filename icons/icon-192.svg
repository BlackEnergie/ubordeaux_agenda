<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fond -->
  <rect width="192" height="192" rx="36" fill="#1a56db"/>
  <!-- Règle : rectangle principal -->
  <rect x="24" y="72" width="144" height="48" rx="10" fill="white" fill-opacity="0.15" stroke="white" stroke-width="4"/>
  <!-- Graduations longues -->
  <line x1="48"  y1="72" x2="48"  y2="96" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="96"  y1="72" x2="96"  y2="96" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="144" y1="72" x2="144" y2="96" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Graduations courtes -->
  <line x1="72"  y1="72" x2="72"  y2="88" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="72" x2="120" y2="88" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
